name: Rust Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      # ===== LINUX =====
      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          mkdir package
          cp target/release/IsJack_tool package/
          cd package
          zip ../IsJack_tool-linux.zip IsJack_tool

      # ===== WINDOWS =====
      - name: Package Windows
        if: runner.os == 'Windows'
        run: |
          mkdir package
          cp target/release/IsJack_tool.exe package/
          cd package
          powershell Compress-Archive IsJack_tool.exe ../IsJack_tool-windows.zip

      # ===== MACOS =====
      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          mkdir package
          cp target/release/IsJack_tool package/
          cd package
          zip ../IsJack_tool-macos.zip IsJack_tool

      # ===== CHECKSUM =====
      - name: Generate checksums
        run: |
          sha256sum *.zip > checksums.txt || shasum -a 256 *.zip > checksums.txt

      # ===== RELEASE =====
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            checksums.txt